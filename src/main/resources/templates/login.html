<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Parking System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
        }
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-center mb-4">Login</h2>

        <!-- Message Alerts -->
        <div id="alert-container"></div>

        <form th:action="@{/login}" method="post" autocomplete="off">
            <div class="mb-3">
                <label for="username" class="form-label">Email:</label>
                <input type="email" id="username" name="username" class="form-control" required placeholder="Enter your email address">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-success w-100">Login</button>
        </form>

        <div class="text-center mt-3">
            <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get Thymeleaf variables
        const sessionError = /*[[${session.error}]]*/ '';
        const paramError = /*[[${param.error}]]*/ false;
        const paramSuccess = /*[[${param.success}]]*/ false;
        const paramLogout = /*[[${param.logout}]]*/ false;

        const alertContainer = document.getElementById('alert-container');

        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            `;
            alertContainer.appendChild(alertDiv);
        }

        // Display messages based on Thymeleaf variables
        if (sessionError) {
            showAlert(sessionError, 'danger');
        } else if (paramError) {
            showAlert('Invalid email or password. Please try again.', 'danger');
        }
        if (paramSuccess) {
            showAlert('Registration successful! Please log in with your credentials.', 'success');
        }
        if (paramLogout) {
            showAlert('You have been successfully logged out.', 'info');
        }
    </script>
</body>
</html>
