spring.application.name=Parking_Reservation_and_Management_System

# Database Configuration for Microsoft SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1434;databaseName=parking_app;encrypt=true;trustServerCertificate=true

spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Hibernate Configuration for SQL Server
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Session Configuration (Fix for the JDBC session error)
spring.session.store-type=none
#spring.jpa.properties.hibernate.format_sql=true
# Disable Hibernate's snake_case conversion
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server Configuration
server.port=8080